<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – ميدي كير</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo"><i class="fas fa-heartbeat"></i><span>ميدي كير</span></a>
    </div>
  </header>

  <main class="container" style="margin-top: 4rem; max-width: 400px;">
    <section>
      <h2 class="section-title" style="text-align:center;">تسجيل الدخول</h2>
      <form id="login-form" class="auth-form" style="margin-top:2rem;">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required />
        <input type="password" id="password" placeholder="كلمة المرور" required />
        <button type="submit" class="btn btn-primary">دخول</button>
      </form>
      <p id="login-error" style="color:#e74c3c; margin-top:1rem; display:none;"></p>
    </section>
  </main>

  <script src="login.js" type="module"></script>
</body>
</html>
