<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة – ميدي كير</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="logo"><i class="fas fa-heartbeat"></i><span>ميدي كير</span></a>
      <nav class="nav-links" id="nav-links">
        <a href="index.html#home">الرئيسية</a>
        <a href="about.html">من نحن</a>
        <a href="features.html">الميزات</a>
        <a href="services.html">الخدمات</a>
        <a href="admin.html" class="active">لوحة الإدارة</a>
        <a href="contact.html">اتصل بنا</a>
      </nav>
      <button id="logoutBtn" class="btn btn-secondary" style="margin-left:auto;">خروج</button>
    </div>
  </header>

  <main class="container" style="margin-top: 2rem;">
    <section>
      <h2 class="section-title">إدارة التذكيرات</h2>
      <form id="reminder-form" class="auth-form" style="margin-bottom: 1.5rem;">
        <input type="text" id="userId" placeholder="معرّف المستخدم" required />
        <input type="text" id="title" placeholder="العنوان" required />
        <input type="text" id="message" placeholder="الرسالة" required />
        <input type="datetime-local" id="scheduled_at" required />
        <button type="submit" class="btn btn-primary">إنشاء تذكير</button>
      </form>
      <table class="glass-card" id="reminders-table" style="width: 100%;">
        <thead>
          <tr><th>المعرّف</th><th>المستخدم</th><th>العنوان</th><th>الوقت</th><th>الإجراء</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section style="margin-top: 3rem;">
      <h2 class="section-title">سجلات SMS</h2>
      <table class="glass-card" id="sms-logs-table" style="width: 100%;">
        <thead>
          <tr><th>المعرّف</th><th>التذكير</th><th>المستخدم</th><th>الحالة</th><th>محاولة</th><th>الخطأ</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="admin.js" type="module"></script>
</body>
</html>
